<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Restaurant Ordering</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 48px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            max-width: 400px;
        }
        h1 { color: #c0392b; font-size: 1.6rem; margin-bottom: 6px; }
        p { color: #777; font-size: 0.95rem; margin-bottom: 24px; }
        .qr-frame {
            border: 3px solid #e74c3c;
            border-radius: 16px;
            padding: 16px;
            display: inline-block;
            margin-bottom: 20px;
        }
        img { display: block; width: 260px; height: 260px; }
        .url-box {
            background: #fdf0ee;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.85rem;
            color: #c0392b;
            font-weight: 600;
            word-break: break-all;
            margin-bottom: 20px;
        }
        .instruction {
            font-size: 0.82rem;
            color: #aaa;
            line-height: 1.5;
        }
        .download-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover { background: #a93226; }
    </style>
</head>
<body>
<div class="card">
    <h1>🍴 Scan to Order</h1>
    <p>Show this QR code to your customers</p>
    <div class="qr-frame">
        <img src="/api/qr" alt="QR Code" id="qrImg">
    </div>
    <div class="url-box" id="menuUrl">Loading...</div>
    <div class="instruction">
        Customers can scan this QR code with their smartphone camera<br>
        to view your menu and place an order.
    </div>
    <a class="download-btn" href="/api/qr" download="restaurant-qr.png">Download QR Code</a>
</div>
<script>
    fetch('/api/server-url')
        .then(r => r.text())
        .then(url => {
            document.getElementById('menuUrl').textContent = url;
        });
</script>
</body>
</html>
